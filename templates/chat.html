{% extends 'base.html' %}

{% block title %}IntelliBlue Chat Assistant{% endblock %}

{% block content %}
<div class="flex flex-col h-full bg-gray-800 rounded-lg shadow-lg border border-gray-700">
    
    <div id="chatWindow" class="flex-1 p-6 overflow-y-auto space-y-4">
        
        {% for msg in history %}
            {% if msg.sender == 'User' %}
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white p-3 rounded-l-lg rounded-br-lg max-w-2xl shadow">{{ msg.text }}
                    </div>
                </div>
            {% else %}
                <div class="flex justify-start">
                    <div class="bg-gray-700 text-gray-200 p-4 rounded-r-lg rounded-bl-lg max-w-2xl shadow border border-gray-600">
                        <span class="font-bold text-blue-400 text-xs uppercase block mb-2 border-b border-gray-600 pb-1">
                            <i class="fa-solid fa-robot mr-1"></i> IntelliBlue
                        </span>
                        <div class="ai-message-content prose prose-invert prose-base max-w-none">{{ msg.text }}</div>
                    </div>
                </div>
            {% endif %}
        {% endfor %}
        
    </div>

    <div class="p-4 bg-gray-900 border-t border-gray-700 rounded-b-lg">
        <form id="chatForm" class="flex space-x-4" onsubmit="sendMessage(event)">
            <input type="text" id="userInput" autocomplete="off" placeholder="Ask about an alert, request mitigation steps..." 
                   class="flex-1 bg-gray-800 text-white placeholder-gray-500 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <button type="button" id="stopBtn" class="hidden bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-lg font-semibold transition shadow-lg flex items-center" onclick="stopMessage()">
                <span>Stop</span> <i class="fa-solid fa-stop ml-2"></i>
            </button>
            <button type="submit" id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold transition shadow-lg flex items-center">
                <span>Send</span> <i class="fa-solid fa-paper-plane ml-2"></i>
            </button>
        </form>
    </div>
</div>

<script>
const chatWindow = document.getElementById('chatWindow');
let abortController = null;

    // 1. Auto-parse history on page load
    window.onload = function() {
        const historyBubbles = document.querySelectorAll('.ai-message-content');
        historyBubbles.forEach(bubble => {
            const rawText = bubble.textContent; // <-- CHANGE THIS LINE
            bubble.innerHTML = marked.parse(rawText);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    };

    function stopMessage() {
        if (abortController) {
            abortController.abort();
        }
    }

    async function sendMessage(event) {
        event.preventDefault();
        
        const inputField = document.getElementById('userInput');
        const message = inputField.value.trim();
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        if (!message) return;

        // Append User message
        inputField.value = '';
        appendMessage('User', message);
        sendBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');

        // Create an empty bubble for the AI response
        const aiBubbleId = appendMessage('IntelliBlue', '<span class="text-gray-400 italic">Thinking<span id="loadingDots-' + Date.now() + '"></span></span>');
        const aiBubbleElement = document.getElementById(aiBubbleId);
        
        // Setup the animated dots logic
        const dotsElement = aiBubbleElement.querySelector('span[id^="loadingDots-"]');
        let dotCount = 0;
        const dotsInterval = setInterval(() => {
            if (dotsElement) {
                dotCount = (dotCount + 1) % 4;
                dotsElement.innerText = '.'.repeat(dotCount);
            }
        }, 400);

        // Add a smooth fade-in reveal class to the bubble wrapper
        aiBubbleElement.parentElement.classList.add('animate-fade-in');

        abortController = new AbortController();
        let rawMarkdown = ""; // We will accumulate the raw text here
        let renderedMarkdown = ""; // The smoothly revealed text
        let isStreaming = true;
        let startedTyping = false;

        // Smooth character-by-character trickle instead of blocky word jumps
        const typeInterval = setInterval(() => {
            if (renderedMarkdown.length < rawMarkdown.length) {
                if (!startedTyping) {
                    clearInterval(dotsInterval);
                    startedTyping = true;
                }
                
                // Reveal a few characters at a time based on how far behind the buffer is
                const charsToAdd = Math.max(1, Math.ceil((rawMarkdown.length - renderedMarkdown.length) / 4));
                renderedMarkdown += rawMarkdown.substring(renderedMarkdown.length, renderedMarkdown.length + charsToAdd);
                
                const isScrolledToBottom = Math.abs(chatWindow.scrollHeight - chatWindow.clientHeight - chatWindow.scrollTop) < 50;
                
                // Parse and append a fading cursor
                let html = marked.parse(renderedMarkdown);
                if (isStreaming) {
                    html = html.replace(/<\/p>$/, ' <span class="inline-block w-2 h-4 bg-blue-400/70 animate-pulse rounded-sm align-middle ml-1"></span></p>');
                }
                aiBubbleElement.innerHTML = html;
                
                if (isScrolledToBottom) {
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            } else if (!isStreaming) {
                // Final clean render without cursor once stream is fully caught up
                aiBubbleElement.innerHTML = marked.parse(renderedMarkdown);
                clearInterval(typeInterval);
            }
        }, 16); // ~60fps smooth rendering

        try {
            const response = await fetch('{{ url_for("api_chat") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message }),
                signal: abortController.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                rawMarkdown += decoder.decode(value, { stream: true });
            }
        } catch (error) {
            if (error.name !== 'AbortError') {
                clearInterval(dotsInterval);
                aiBubbleElement.innerText = "Error connecting to the backend.";
            } else {
                // User interrupted the fetch
                rawMarkdown += "\n\n*(user interruption)*";
            }
        } finally {
            clearInterval(dotsInterval); // ensure it's cleared if stopped immediately
            isStreaming = false; // signals the interval to shut down naturally
            sendBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            abortController = null;
        }
    }

    // Helper function to draw chat bubbles
    function appendMessage(sender, text) {
        const wrapper = document.createElement('div');
        const uniqueId = 'msg-' + Date.now();

        if (sender === 'User') {
            wrapper.className = 'flex justify-end';
            wrapper.innerHTML = `
                <div class="bg-blue-600 text-white p-3 rounded-l-lg rounded-br-lg max-w-2xl shadow whitespace-pre-wrap">${text}</div>
            `;
        } else {
            wrapper.className = 'flex justify-start';
            // Notice the "prose prose-invert" class added here. This triggers Tailwind's beautiful Markdown styling!
            wrapper.innerHTML = `
                <div class="bg-gray-700 text-gray-200 p-4 rounded-r-lg rounded-bl-lg max-w-2xl shadow border border-gray-600">
                    <span class="font-bold text-blue-400 text-xs uppercase block mb-2 border-b border-gray-600 pb-1">
                        <i class="fa-solid fa-robot mr-1"></i> IntelliBlue
                    </span>
                    <div id="${uniqueId}" class="ai-message-content prose prose-invert prose-base max-w-none">${text}</div>
                </div>
            `;
        }
        
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return uniqueId;
    }
</script>
{% endblock %}
